name: Deploy Jekyll with Notebooks

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install jupyter nbconvert

      - name: Extract descriptions
        run: python scripts/extract_descriptions.py

      - name: Generate Blog Index
        run: bash build.sh

      - name: Convert ipynb to Markdown and Add Frontmatter
        run: |
          mkdir -p _datos _historia _libros
          
          # Convert notebooks to Markdown recursively
          shopt -s globstar nullglob
          for nb in notebooks/**/*.ipynb; do
            if [ -f "$nb" ]; then
              echo "Converting $nb..."
              jupyter nbconvert --to markdown "$nb"
            fi
          done

          # Move markdown files and inject frontmatter
          for md in notebooks/**/*.md; do
            if [ -f "$md" ]; then
              filename=$(basename "$md")
              if [ "${filename,,}" == "description.md" ]; then
                continue
              fi
              dirname=$(dirname "$md")
              
              # Assign layout and target folder prioritizing parent directory
              if [[ "$dirname" == *"historia"* ]]; then
                target="_historia/$filename"
                layout="historia"
              elif [[ "$dirname" == *"libros"* ]] || [[ "$dirname" == *"biblio"* ]]; then
                target="_libros/$filename"
                layout="libros"
              elif [[ "$dirname" == *"ingenieria"* ]] || [[ "$dirname" == *"data"* ]]; then
                target="_datos/$filename"
                layout="data"
              else
                target="_datos/$filename"
                layout="data"
              fi
              
              rel_dir="${dirname#notebooks/}"
              top_cat=$(echo "$rel_dir" | cut -d'/' -f1)
              subtopic_raw=$(echo "$rel_dir" | cut -s -d'/' -f2)
              
              if [ -z "$subtopic_raw" ]; then
                subtopic="General"
              else
                subtopic=$(echo "$subtopic_raw" | tr '-' ' ' | tr '_' ' ' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
              fi
              
              # Generate current date for Jekyll Sort compatibility
              DATE_TODAY=$(date "+%Y-%m-%d")
              
              # Try to extract book_title and author from notebook metadata (for libros)
              nb_file="${md%.md}.ipynb"
              book_title=""
              book_author=""
              if [ -f "$nb_file" ] && [[ "$layout" == "libros" ]]; then
                book_title=$(python3 scripts/extract_book_metadata.py "$nb_file" book_title 2>/dev/null || echo "")
                book_author=$(python3 scripts/extract_book_metadata.py "$nb_file" author 2>/dev/null || echo "")
              fi
              
              # Inject frontmatter dynamically into the target file
              echo "---" > "$target"
              echo "layout: $layout" >> "$target"
              
              if [ -n "$book_title" ] && [ -n "$book_author" ]; then
                echo "title: \"$book_title\"" >> "$target"
                echo "book_author: \"$book_author\"" >> "$target"
              else
                title=$(echo "${filename%.md}" | tr '-' ' ' | tr '_' ' ')
                echo "title: \"$title\"" >> "$target"
              fi
              
              echo "subtopic: \"$subtopic\"" >> "$target"
              echo "---" >> "$target"
              echo "" >> "$target"
              
              cat "$md" >> "$target"
              
              echo "File moved to $target with layout: $layout"
              
              # Delete the temporary markdown file
              rm "$md"
            fi
          done
          
          # Move notebook assets (images) if nbconvert generated any folders
          for folder in notebooks/**/*_files/; do
            if [ -d "${folder%/}" ]; then
              true_folder="${folder%/}"
              mkdir -p assets/img/
              cp -r "$true_folder" assets/img/
              
              # Update image references in target markdown files
              for mdfile in _datos/*.md _historia/*.md _historia/**/*.md _libros/*.md _libros/**/*.md; do
                if [ -f "$mdfile" ]; then
                  sed -i "s|$(basename "$true_folder")/|/assets/img/$(basename "$true_folder")/|g" "$mdfile"
                fi
              done
            fi
          done

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4