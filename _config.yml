# Basic Configuration
url: "https://ydmarinb.github.io"
baseurl: ""
title: "ydmarinb Analytics Blog"
description: "Data Engineering, Statistics & Colombian History"

# Collections
collections:
  historia:
    output: true
    permalink: /historia/:path/
  statistics:
    output: true
    permalink: /statistics/:path/
  datos:
    output: true
    permalink: /data-engineering/:path/

# Defaults for automatic variable injection
defaults:
  - scope:
      path: ""
      type: historia
    values:
      layout: historia
      lang: "es"
  - scope:
      path: ""
      type: statistics
    values:
      layout: statistics
      lang: "en"
  - scope:
      path: ""
      type: datos
    values:
      layout: data
      lang: "en"

# Active Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude dependencies
exclude:
  - _notebooks
  - .venv
  - build.sh
  - serve.sh
