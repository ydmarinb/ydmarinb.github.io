# Configuración Básica
url: "https://ydmarinb.github.io"
baseurl: ""
title: "Blog de Datos"
description: "Data Engineering, Statistics & Colombian History"

# Colecciones
collections:
  historia:
    output: true
    permalink: /historia/:path/
  estadistica:
    output: true
    permalink: /statistics/:path/
  datos:
    output: true
    permalink: /data-engineering/:path/

# Defaults para inyectar variables mágicas
defaults:
  - scope:
      path: ""
      type: historia
    values:
      layout: default
      lang: "es"
  - scope:
      path: "_historia/antioquia"
      type: historia
    values:
      subcategoria: "antioquia"
  - scope:
      path: "_historia/medellin"
      type: historia
    values:
      subcategoria: "medellin"
  - scope:
      path: "_historia/colombia"
      type: historia
    values:
      subcategoria: "colombia"
  - scope:
      path: ""
      type: estadistica
    values:
      layout: default
      lang: "en"
  - scope:
      path: ""
      type: datos
    values:
      layout: default
      lang: "en"

# Plugins a utilizar
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Excluir la carpeta _notebooks u otras rutinas personalizadas
exclude:
  - _notebooks
  - .venv
  - build.sh
  - serve.sh
