<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Data Architect & Senior Data Engineer. Specializing in Data Engineering & Modern Data Architecture.">
  <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
  <meta property="og:description" content="Data Architect with expertise in ETL/ELT architecture, cloud infrastructure, and modern data platforms.">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:type" content="website">
  <title>{{ page.title | default: site.title | escape }}</title>
  
  <!-- LLM / SEO Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{ page.title | escape }}",
    "url": "{{ site.url }}{{ page.url }}",
    "author": {
      "@type": "Person",
      "name": "Yubar Daniel Marín Benjumea",
      "jobTitle": "Data Architect",
      "url": "https://ydmarinb.github.io/"
    }
  }
  </script>

  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="/assets/style.css">

  <!-- MathJax for Equations -->
  <script src="https://cdn.polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- Prism.js for Code Highlighting -->
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-scala.min.js"></script>
</head>

<body class="{{ page.body_class }}">
  <header class="{{ page.header_class }}">
    <div class="container">
      <nav>
        <a href="/" class="logo">ydmarinb</a>
        <ul>
          <li><a href="/data-engineering.html">Data Architecture</a></li>
          <!-- <li><a href="/libros.html">Biblioteca</a></li> -->
        </ul>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 ydmarinb. All rights reserved.</p>
      <p style="font-size: 14px; margin-top: 10px; color: #999;">
        Built with ❤️ | Static site generated from Jupyter notebooks
      </p>
    </div>
  </footer>

  <script>
    // Prism.js highlightAll
    document.addEventListener('DOMContentLoaded', function () {
      Prism.highlightAll();
    });
  </script>
</body>
</html>
